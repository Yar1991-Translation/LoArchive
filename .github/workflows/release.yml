name: Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tauri.conf.json
        id: version
        run: |
          $VERSION = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "version=$VERSION" >> $env:GITHUB_OUTPUT
          echo "Resolved version: $VERSION"
        shell: pwsh

      - name: Get commit messages since last tag
        id: changelog
        run: |
          $LAST_TAG = git describe --tags --abbrev=0 2>$null
          if ($LAST_TAG) {
            $COMMITS = git log "$LAST_TAG..HEAD" --pretty=format:"- %s"
          } else {
            $COMMITS = git log --pretty=format:"- %s" -20
          }
          if (-not $COMMITS) { $COMMITS = "- Initial release" }
          echo "commits<<EOF" >> $env:GITHUB_OUTPUT
          echo $COMMITS >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Node dependencies
        run: npm ci

      - name: Build backend
        run: python build_backend.py

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.version.outputs.version }}
          releaseName: 'LoArchive v${{ steps.version.outputs.version }}'
          releaseBody: |
            ## LoArchive v${{ steps.version.outputs.version }}
            
            ### 📝 更新内容
            ${{ steps.changelog.outputs.commits }}
            
            ---
            
            ### 📥 下载说明
            | 文件 | 说明 |
            |------|------|
            | `LoArchive_*_x64-setup.exe` | 🎯 **安装版**（推荐） |
            
            ### 🔧 使用方法
            1. 下载并安装
            2. 打开应用
            3. 在「设置」中配置 Lofter 登录信息
            4. 开始使用！
            
            ### ✨ 功能特性
            - 📚 Lofter 喜欢/分享/标签爬取
            - 📖 AO3 作品下载
            - 🖼️ 图片批量下载
            - 📄 支持导出 PDF/EPUB/TXT
            - 🌙 深色模式
            - 🔄 自动检查更新
            
            ---
            <sub>构建时间: ${{ github.event.head_commit.timestamp }}</sub>
          releaseDraft: false
          prerelease: false
